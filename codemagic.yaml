workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.3
      vars:
        BUNDLE_ID: com.viajandoconjeans.app
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile $PROFILE_PATH"
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "Building workspace: $XCODE_WORKSPACE with scheme: $XCODE_SCHEME"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Submit to App Store Connect via Fastlane
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting $IPA_FILE via Fastlane..."
          gem install fastlane --no-document 2>&1 | tail -3
          # Patch Fastlane token.rb: replace deprecated OpenSSL::PKey::EC.new with OpenSSL::PKey.read
          # This fixes "invalid curve name" on macOS 15 with LibreSSL
          TOKEN_RB=$(find ~/.rbenv -name "token.rb" -path "*/spaceship/connect_api/*" 2>/dev/null | head -1)
          echo "Patching: $TOKEN_RB"
          # macOS sed requires empty string after -i; pattern uses 'key' not 'raw_key'
          sed -i '' 's/OpenSSL::PKey::EC\.new(key)/OpenSSL::PKey.read(key)/g' "$TOKEN_RB"
          grep -n "OpenSSL::PKey" "$TOKEN_RB" | head -5
          # Decode and prepare the key
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          jq -n \
            --arg key_id "$ASC_KEY_ID" \
            --arg issuer_id "$ASC_ISSUER_ID" \
            --rawfile key /tmp/key.pem \
            '{key_id: $key_id, issuer_id: $issuer_id, key: $key, in_house: false}' \
            > /tmp/api_key.json
          python3 -c "import json; d=json.load(open('/tmp/api_key.json')); print('key_id:', d['key_id'])"
          fastlane pilot upload \
            --api_key_path /tmp/api_key.json \
            --ipa "$IPA_FILE" \
            --skip_waiting_for_build_processing true \
            --skip_submission true
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
