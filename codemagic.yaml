workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: app.replit.viajandoconjeans
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up automatic code signing
        script: |
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$ASC_KEY_ID"
          export APP_STORE_CONNECT_ISSUER_ID="$ASC_ISSUER_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/key.pem)"
          echo "=== Fetching signing files automatically ==="
          app-store-connect fetch-signing-files \
            --type IOS_APP_STORE \
            --bundle-identifier "$BUNDLE_ID" \
            --create \
            --verbose 2>&1
          echo "=== Setting up keychain with fetched certificate ==="
          keychain initialize
          app-store-connect list-certificates \
            --type IOS_DISTRIBUTION \
            --save \
            --verbose 2>&1 || true
          app-store-connect list-certificates \
            --type DISTRIBUTION \
            --save \
            --verbose 2>&1 || true
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "=== Bundle ID in project ==="
          grep PRODUCT_BUNDLE_IDENTIFIER ios/*.xcodeproj/project.pbxproj | head -3
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Fix iTMSTransporter symlink
        script: |
          ITMST_ACTUAL=$(find /Applications/Xcode-16.2.app/Contents/Developer -name "iTMSTransporter" 2>/dev/null | head -1)
          sudo mkdir -p /usr/local/itms/bin
          sudo ln -sf "$ITMST_ACTUAL" /usr/local/itms/bin/iTMSTransporter
      - name: Submit to App Store
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting: $IPA_FILE"
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$ASC_KEY_ID"
          export APP_STORE_CONNECT_ISSUER_ID="$ASC_ISSUER_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/key.pem)"
          app-store-connect publish \
            --path "$IPA_FILE" \
            --verbose 2>&1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
