workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: com.viajandoconjeans.app
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile $PROFILE_PATH"
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "Building workspace: $XCODE_WORKSPACE with scheme: $XCODE_SCHEME"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Fix iTMSTransporter + list apps diagnostic
        script: |
          # Fix iTMSTransporter for Xcode 16.2
          ITMST_ACTUAL=$(find /Applications/Xcode-16.2.app/Contents/Developer -name "iTMSTransporter" 2>/dev/null | head -1)
          echo "Actual iTMSTransporter: $ITMST_ACTUAL"
          sudo mkdir -p /usr/local/itms/bin
          sudo ln -sf "$ITMST_ACTUAL" /usr/local/itms/bin/iTMSTransporter
          ls -la /usr/local/itms/bin/iTMSTransporter
          # List apps via ASC CLI with correct env vars
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$ASC_KEY_ID"
          export APP_STORE_CONNECT_ISSUER_ID="$ASC_ISSUER_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/key.pem)"
          echo "=== Listing apps via ASC CLI ==="
          app-store-connect apps list 2>&1 || true
      - name: Submit via app-store-connect publish CLI
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting $IPA_FILE via app-store-connect publish..."
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$ASC_KEY_ID"
          export APP_STORE_CONNECT_ISSUER_ID="$ASC_ISSUER_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/key.pem)"
          app-store-connect publish \
            --path "$IPA_FILE" \
            --type IOS \
            --verbose 2>&1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
