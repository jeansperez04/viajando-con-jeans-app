workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    environment:
      node: 20.9.0
      xcode: latest
      vars:
        BUNDLE_ID: com.viajandoconjeans.app
        XCODE_WORKSPACE: ios/viajandoconjeans.xcworkspace
        XCODE_SCHEME: viajandoconjeans
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: keychain initialize
      - name: Set up signing certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates \
            --certificate /tmp/certificate.p12 \
            --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/$(uuidgen).mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed provisioning profile $PROFILE_PATH"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "DEVELOPMENT_TEAM=5NFLTZ6PD8 CODE_SIGN_IDENTITY='Apple Distribution'"
    artifacts:
      - build/ios/ipa/*.ipa
