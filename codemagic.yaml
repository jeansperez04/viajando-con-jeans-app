workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: app.replit.viajandoconjeans
        TEAM_ID: 5NFLTZ6PD8
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Profile installed:"
          security cms -D -i "$PROFILE_PATH" | plutil -p - | grep -E 'application-identifier|Name|TeamName' | head -5
      - name: Set up API key
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          KEY_PATH=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          # Decode the base64 key
          echo "$ASC_PRIVATE_KEY" | base64 -D > "$KEY_PATH" 2>/dev/null

          # Strip leading/trailing whitespace from every line (fixes malformed PEM markers)
          sed -i '' 's/^[[:space:]]*//;s/[[:space:]]*$//' "$KEY_PATH"

          SIZE=$(wc -c < "$KEY_PATH" | tr -d ' ')
          FIRST_LINE=$(head -1 "$KEY_PATH")
          LAST_LINE=$(tail -1 "$KEY_PATH")

          echo "Key size: ${SIZE} bytes"
          echo "Key valid: first=[${FIRST_LINE}] last=[${LAST_LINE}]"

          if [[ "$FIRST_LINE" != "-----BEGIN PRIVATE KEY-----" ]] || [[ "$LAST_LINE" != "-----END PRIVATE KEY-----" ]]; then
            echo "ERROR: Key PEM markers invalid after cleanup"
            exit 1
          fi
          echo "Key is valid PEM."
      - name: Build and upload to App Store
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "Workspace: $XCODE_WORKSPACE  Scheme: $XCODE_SCHEME"

          xcode-project use-profiles

          # Archive
          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/ios/archive.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            | xcpretty

          # Export options plist — uploads directly to App Store Connect
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>5NFLTZ6PD8</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          # Export & upload
          xcodebuild -exportArchive \
            -archivePath build/ios/archive.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            -allowProvisioningUpdates \
            | xcpretty
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
