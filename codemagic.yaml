workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 120
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.viajandoconjeans.app
      node: 20.9.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/viajandoconjeans.xcworkspace \
            --scheme viajandoconjeans
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: true
        release_type: MANUAL
