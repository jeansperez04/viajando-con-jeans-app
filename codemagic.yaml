workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: app.replit.viajandoconjeans
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile at $PROFILE_PATH"
          # Show profile details
          security cms -D -i "$PROFILE_PATH" | plutil -p - | grep -E 'application-identifier|TeamName|Name|CreationDate|ExpirationDate' | head -20
      - name: Build IPA (verbose xcodebuild)
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "=== Bundle ID in Xcode project ==="
          grep -r PRODUCT_BUNDLE_IDENTIFIER ios/*.xcodeproj/project.pbxproj | head -5
          echo "=== Building ==="
          xcode-project use-profiles
          ARCHIVE_PATH="build/ios/xcarchive/ViajandoconJeans.xcarchive"
          mkdir -p build/ios/xcarchive
          # Run xcodebuild directly with full output
          set -o pipefail
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=5NFLTZ6PD8 \
            2>&1 | grep -E 'error:|warning:|Signing|CodeSign|FAILED|failed|succeed|archive' | tail -50
          echo "=== Export IPA ==="
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist \
            2>&1 | tail -30
      - name: Fix iTMSTransporter symlink
        script: |
          ITMST_ACTUAL=$(find /Applications/Xcode-16.2.app/Contents/Developer -name "iTMSTransporter" 2>/dev/null | head -1)
          sudo mkdir -p /usr/local/itms/bin
          sudo ln -sf "$ITMST_ACTUAL" /usr/local/itms/bin/iTMSTransporter
      - name: Submit to App Store
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting: $IPA_FILE"
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          export APP_STORE_CONNECT_KEY_IDENTIFIER="$ASC_KEY_ID"
          export APP_STORE_CONNECT_ISSUER_ID="$ASC_ISSUER_ID"
          export APP_STORE_CONNECT_PRIVATE_KEY="$(cat /tmp/key.pem)"
          app-store-connect publish \
            --path "$IPA_FILE" \
            --verbose 2>&1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
