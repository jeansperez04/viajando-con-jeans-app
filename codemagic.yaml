workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.3
      vars:
        BUNDLE_ID: com.viajandoconjeans.app
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile $PROFILE_PATH"
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "Building workspace: $XCODE_WORKSPACE with scheme: $XCODE_SCHEME"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Diagnose App Store Connect access
        script: |
          pip3 install PyJWT cryptography --quiet 2>/dev/null
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/key.pem
          python3 << 'PYEOF'
          import jwt, time, urllib.request, json
          key = open('/tmp/key.pem').read()
          import os
          key_id = os.environ['ASC_KEY_ID']
          issuer_id = os.environ['ASC_ISSUER_ID']
          payload = {'iss': issuer_id, 'iat': int(time.time()), 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}
          token = jwt.encode(payload, key, algorithm='ES256', headers={'kid': key_id})
          req = urllib.request.Request('https://api.appstoreconnect.apple.com/v1/apps?limit=20', headers={'Authorization': f'Bearer {token}'})
          try:
            with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())
              apps = data.get('data', [])
              print(f'Found {len(apps)} apps in App Store Connect:')
              for a in apps:
                print(f"  - {a['attributes']['name']} | bundle: {a['attributes']['bundleId']} | id: {a['id']}")
              if not apps:
                print('NO APPS FOUND - the API key may not have access to any apps')
          except Exception as e:
            print(f'REST API call failed: {e}')
          PYEOF
      - name: Submit to App Store Connect via altool (Apple ID auth)
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting $IPA_FILE..."
          echo "Apple ID: $APP_STORE_CONNECT_APPLE_ID"
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            --type ios \
            --username "$APP_STORE_CONNECT_APPLE_ID" \
            --password "$APP_STORE_CONNECT_PASSWORD" \
            --verbose 2>&1 | tee /tmp/altool_output.txt
          exit ${PIPESTATUS[0]}
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
