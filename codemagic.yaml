workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.2
      vars:
        BUNDLE_ID: app.replit.viajandoconjeans
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile: $PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" | plutil -p - | grep -E 'application-identifier|Name|TeamName' | head -5
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Submit to App Store
        script: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting: $IPA_FILE"
          # Place the p8 key where xcrun altool expects it
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          # Fix iTMSTransporter path
          ITMST=$(find /Applications/Xcode-16.2.app/Contents/Developer -name "iTMSTransporter" 2>/dev/null | head -1)
          sudo mkdir -p /usr/local/itms/bin
          sudo ln -sf "$ITMST" /usr/local/itms/bin/iTMSTransporter
          # Upload via altool
          xcrun altool --upload-app \
            -f "$IPA_FILE" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose 2>&1
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
