workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      xcode: 16.3
      vars:
        BUNDLE_ID: com.viajandoconjeans.app
      groups:
        - ios_signing
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps
      - name: Expo prebuild
        script: npx expo prebuild --clean --platform ios --no-install
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up keychain
        script: |
          keychain initialize
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
      - name: Set up provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          PROFILE_PATH="$(mktemp "$PROFILES_HOME"/XXXXXX.mobileprovision)"
          echo $CM_PROVISIONING_PROFILE | base64 --decode > "$PROFILE_PATH"
          echo "Installed profile $PROFILE_PATH"
      - name: Build IPA
        script: |
          XCODE_WORKSPACE=$(find ios -name "*.xcworkspace" -maxdepth 1 | head -1)
          XCODE_SCHEME=$(basename "$XCODE_WORKSPACE" .xcworkspace)
          echo "Building workspace: $XCODE_WORKSPACE with scheme: $XCODE_SCHEME"
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
      - name: Submit to App Store Connect
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Submitting $IPA_FILE to App Store Connect..."
          app-store-connect publish \
            --api-key "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key "@file:$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            --path "$IPA_FILE" \
            --platform IOS
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - jeansperez04@gmail.com
        notify:
          success: true
          failure: true
